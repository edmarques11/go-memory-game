# fly.toml app configuration file generated for go-memory-game on 2026-04-19T17:59:20Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'go-memory-game'
primary_region = 'gru'

[build]
  [build.args]
    GO_VERSION = '1.26.1'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8079
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
